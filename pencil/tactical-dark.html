<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Provisioning Card</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        accent: '#00c2c7', // シアン系のアクセントカラー
                        accentDark: '#0b8b9e', // ボタン等の暗めのシアン
                        cardBg: '#18181b', // rgb(24 24 27)
                        cardBorder: '#27272a', // rgb(39 39 42)
                        innerBg: '#111113', // rgb(17 17 19)
                    }
                }
            }
        }
    </script>
    <style>
        /* 提供されたCSSを元に作成したカスタムクラス */
        
        /* 外側のカード (周り) のシャドウとホバーアニメーション */
        .card-outer {
            box-shadow: 
                0 0 0 1px rgba(22, 78, 99, 0.3),
                inset 0 1px 2px 0 rgba(255, 255, 255, 0.1), 
                0 1px 2px 0 rgba(0, 0, 0, 0.5), 
                0 4px 12px 0 rgba(0, 0, 0, 0.5);
            transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-outer:hover {
            transform: translateY(-0.125rem);
        }

        /* 内側のスペック表 (中央) のシャドウ */
        .card-inner-box {
            box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.6), 0 1px 0 0 rgba(255,255,255,0.05);
        }

        /* 上部のアクセントラインの光彩 */
        .top-glow {
            box-shadow: 0 0 15px 1px rgba(0, 194, 199, 0.6);
        }
    </style>
</head>
<body class="bg-[#0e0e11] min-h-screen flex items-center justify-center p-6 text-[#cbd5e1] font-sans antialiased">

    <!-- カード全体のラッパー (周り) -->
    <!-- padding: 0.25rem (p-1) とボーダー、背景色を適用 -->
    <div class="relative w-full max-w-[360px] rounded-xl border border-cardBorder bg-cardBg p-1 card-outer">
        
        <!-- 上部中央のシアンのハイライトライン -->
        <div class="absolute -top-[1px] left-1/2 -translate-x-1/2 w-16 h-[2px] bg-accent top-glow z-10 rounded-full"></div>

        <!-- カード内部のメインコンテナ -->
        <!-- 角丸を外側より少し小さくしてフィットさせる -->
        <div class="relative bg-cardBg rounded-lg px-5 py-6 pt-5 h-full flex flex-col">
            
            <!-- カード四隅のネジ穴のような装飾 (薄いドット) -->
            <div class="absolute top-3 left-3 w-1.5 h-1.5 rounded-full bg-zinc-800/50 shadow-inner"></div>
            <div class="absolute top-3 right-3 w-1.5 h-1.5 rounded-full bg-zinc-800/50 shadow-inner"></div>

            <!-- ヘッダー (アイコンと TYPE-S) -->
            <div class="flex justify-between items-start mb-6 mt-1">
                <!-- アイコンボックス -->
                <div class="w-[38px] h-[38px] rounded border border-cardBorder bg-innerBg flex items-center justify-center shadow-inner">
                    <i data-lucide="database" class="w-[18px] h-[18px] text-accent"></i>
                </div>
                <!-- TYPE-S バッジ -->
                <div class="text-[10px] font-bold tracking-[0.15em] text-accent uppercase mt-1">
                    TYPE-S
                </div>
            </div>

            <!-- タイトルと価格 -->
            <div class="mb-4">
                <h3 class="text-white text-lg font-semibold mb-1">Fusion Cluster</h3>
                <div class="flex items-baseline gap-1.5">
                    <span class="text-white text-3xl font-bold tracking-tight">$49</span>
                    <span class="text-zinc-500 text-sm font-medium">/ mo</span>
                </div>
            </div>

            <!-- 説明文 -->
            <p class="text-zinc-400 text-[13px] mb-8 leading-relaxed">
                Dedicated computational power for high-frequency production workloads.
            </p>

            <!-- スペック表 (中央) -->
            <!-- 提供された margin-bottom: 2rem (mb-8), padding: 1rem (p-4), background 等を適用 -->
            <div class="card-inner-box border border-cardBorder bg-innerBg rounded p-4 mb-6">
                <!-- 行 1 -->
                <div class="flex justify-between items-center py-2.5 border-b border-zinc-800/60">
                    <span class="text-zinc-500 text-[13px]">Throughput</span>
                    <span class="text-accent font-medium text-[13px] font-mono tracking-tight">Unlimited</span>
                </div>
                <!-- 行 2 -->
                <div class="flex justify-between items-center py-2.5 border-b border-zinc-800/60">
                    <span class="text-zinc-500 text-[13px]">Protocol</span>
                    <span class="text-zinc-300 font-medium text-[13px] font-mono tracking-tight">IPv6 <span class="text-zinc-500 font-normal">Ready</span></span>
                </div>
                <!-- 行 3 -->
                <div class="flex justify-between items-center py-2.5">
                    <span class="text-zinc-500 text-[13px]">Uptime</span>
                    <span class="text-zinc-300 font-medium text-[13px] font-mono tracking-tight">99.99% SLA</span>
                </div>
            </div>

            <!-- 下部スペーサー (フレックスボックスでボタンを下に押しやる) -->
            <div class="flex-grow"></div>

            <!-- ボタン -->
            <button class="w-full bg-accentDark hover:bg-[#10a1b8] text-white font-semibold text-[11px] tracking-widest uppercase py-3.5 rounded transition-colors flex items-center justify-center gap-2 relative overflow-hidden group">
                <!-- ボタン内のうっすらとしたグラデーション効果 -->
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent translate-x-[-100%] group-hover:animate-[shimmer_1.5s_infinite]"></div>
                
                <span class="relative z-10">INITIALIZE NODE</span>
                <i data-lucide="zap" class="w-3.5 h-3.5 fill-current relative z-10"></i>
            </button>
        </div>
    </div>

    <style>
        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }
    </style>

    <!-- アイコンの初期化 -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
