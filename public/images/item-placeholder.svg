<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="300" fill="#F3F4F6"/>
  
  <!-- Image icon -->
  <g transform="translate(75, 75)">
    <!-- Frame -->
    <rect x="10" y="10" width="130" height="110" rx="8" stroke="#9CA3AF" stroke-width="3" fill="none"/>
    
    <!-- Mountain icon (landscape) -->
    <path d="M 25 90 L 50 60 L 75 85 L 100 50 L 125 90 Z" fill="#D1D5DB"/>
    
    <!-- Sun icon -->
    <circle cx="110" cy="35" r="12" fill="#E5E7EB"/>
  </g>
  
  <!-- Text -->
  <text x="150" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#6B7280" font-weight="500">
    画像なし
  </text>
  <text x="150" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9CA3AF">
    No Image
  </text>
</svg>
